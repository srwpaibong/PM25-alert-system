name: PM25-Automation

on:
  schedule:
    - cron: '*/30 * * * *'  # รันทุก 30 นาที
  workflow_dispatch:        # ให้กดรันเองได้ด้วย

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: pip install -r requirements.txt

      - name: Run Bot
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          AIR4THAI_KEY: ${{ secrets.AIR4THAI_KEY }}
        run: python bot.py

      - name: Update GitHub with Graphs and Log
        run: |
          git config --global user.name 'AirQualityBot'
          git config --global user.email 'bot@github.com'
          git add log.json
          git commit -m "Update graphs and log" || echo "No changes"
          git pull origin main --rebase --autostash
          git push origin main
