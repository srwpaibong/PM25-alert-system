name: Run PM2.5 Alert Bot

on:
  schedule:
    # ตั้งเวลาให้รันทุกๆ 25 นาที (จะทำงานตอนนาทีที่ 0, 25, 50 ของทุกชั่วโมง)
    - cron: '*/25 * * * *'
  workflow_dispatch: # ปุ่มสำหรับกดรันด้วยตัวเอง (Manual run)

permissions:
  contents: write # อนุญาตให้ Action บันทึกไฟล์ log.json กลับเข้า Repository ได้

# บังคับให้ GitHub Actions รันบน Node 24 เพื่อแก้ปัญหาคำเตือนแจ้งเตือน Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pytz

      - name: Run Bot Script
        env:
          LINE_ACCESS_TOKEN: ${{ secrets.LINE_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python bot.py

      - name: Commit and Push Log File
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add log.json
          # เช็คว่าไฟล์ log.json มีการเปลี่ยนแปลงหรือไม่ ถ้ามีให้ทำการ Commit และ Push
          git diff-index --quiet HEAD || git commit -m "Auto-update log.json"
          git push
